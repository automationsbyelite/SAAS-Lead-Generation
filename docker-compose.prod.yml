# ============================================================
# docker-compose.prod.yml — PRODUCTION
# ============================================================
# Features:
#  - Optimized multi-stage builds (no source code, minimal images)
#  - Local MongoDB container for production (mongo:7)
#  - Restart policies for reliability
#  - Resource limits for stability
#  - Separated .env.production file support
# ============================================================
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# ============================================================

services:
  # ── MongoDB Database ────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: saas_mongo_prod
    restart: always
    environment:
      MONGO_INITDB_DATABASE: saas_db
    volumes:
      - mongo_data_prod:/data/db
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (BullMQ Queue) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data_prod:/data
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backend (NestJS — production build) ────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    image: saas-backend:latest
    container_name: saas_backend_prod
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/saas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - saas_network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend (Next.js — production standalone build) ───────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
    image: saas-frontend:latest
    container_name: saas_frontend_prod
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 4000
      HOSTNAME: 0.0.0.0
    ports:
      - "4000:4000"
    networks:
      - saas_network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Worker (NestJS context — production build) ─────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: production
    image: saas-worker:latest
    container_name: saas_worker_prod
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/saas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - saas_network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

# ── Named Volumes ────────────────────────────────────────────
volumes:
  mongo_data_prod:
  redis_data_prod:

# ── Network ─────────────────────────────────────────────────
networks:
  saas_network:
    driver: bridge
